<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>日本史・世界史復習一問一答</title>
    

  </head>
    
  <body>
  <!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>歴史一問一答</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
  --orange: #78d61f;
  --orange2: #92eb39;
  --orange3: #b6f56e;

  --yellow: #e5ff54;

  --bg: #f8fff0;
  --bg2: #f1ffe2;
  --surface: #ffffff;

  --border: #cde7a7;

  --text: #243300;
  --text-sub: #6d8a2e;

  --red: #df3b3b;
  --green: #4dbb34;

  --japan: #df3b3b;
  --world: #2e7ae6;

  --shadow: rgba(120, 214, 31, 0.22);
}

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'M PLUS Rounded 1c', sans-serif;
      min-height: 100vh;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(255, 107, 26, 0.10) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(255, 217, 74, 0.13) 0%, transparent 40%),
        radial-gradient(circle at 60% 10%, rgba(255, 148, 72, 0.08) 0%, transparent 30%);
    }

    header {
      background: var(--orange);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 4px 20px var(--shadow);
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      right: -30px;
      top: -30px;
      width: 120px;
      height: 120px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 50%;
    }

    header::after {
      content: '';
      position: absolute;
      right: 60px;
      bottom: -40px;
      width: 90px;
      height: 90px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 50%;
    }

    header h1 {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 1.5rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.06em;
      text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.15);
    }

    .header-badge {
      background: var(--yellow);
      color: var(--orange);
      font-size: 0.65rem;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 999px;
      letter-spacing: 0.1em;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 20px;
    }

    .filter-panel {
      background: var(--surface);
      border: 2.5px solid var(--border);
      border-radius: 20px;
      padding: 24px 24px 20px;
      margin-bottom: 24px;
      box-shadow: 0 6px 32px var(--shadow);
    }

    .panel-title {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.18em;
      color: var(--orange);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-title::before {
      content: '';
      display: inline-block;
      width: 10px;
      height: 10px;
      background: var(--orange);
      border-radius: 50%;
    }

    .filter-group {
      margin-bottom: 14px;
    }

    .filter-group:last-of-type {
      margin-bottom: 0;
    }

    .filter-label {
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      color: var(--text-sub);
      margin-bottom: 7px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .chip {
      padding: 5px 13px;
      border-radius: 999px;
      border: 2px solid var(--border);
      background: var(--bg2);
      color: var(--text-sub);
      font-size: 0.76rem;
      font-weight: 700;
      font-family: 'M PLUS Rounded 1c', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.03em;
      user-select: none;
    }

    .chip:hover {
      border-color: var(--orange2);
      color: var(--orange);
      background: #fff5ee;
      transform: translateY(-1px);
    }

    .chip.active {
      background: var(--orange);
      border-color: var(--orange);
      color: #fff;
      box-shadow: 0 3px 10px rgba(255, 107, 26, 0.35);
      transform: translateY(-1px);
    }

    .chip.subject-jp.active {
      background: var(--japan);
      border-color: var(--japan);
    }

    .chip.subject-wh.active {
      background: var(--world);
      border-color: var(--world);
    }

    .select-all-btn {
      padding: 4px 10px;
      border-radius: 999px;
      border: 2px dashed var(--border);
      background: transparent;
      color: var(--text-sub);
      font-size: 0.68rem;
      font-weight: 800;
      font-family: 'M PLUS Rounded 1c', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .select-all-btn:hover {
      border-color: var(--orange);
      color: var(--orange);
      background: #fff5ee;
    }

    .select-all-btn.all-selected {
      border-color: var(--orange2);
      color: var(--orange2);
    }

    .filter-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
      padding-top: 18px;
      border-top: 2px dashed var(--border);
      flex-wrap: wrap;
    }

    .btn {
      padding: 11px 26px;
      border-radius: 999px;
      border: none;
      font-family: 'M PLUS Rounded 1c', sans-serif;
      font-size: 0.85rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.06em;
    }

    .btn-primary {
      background: var(--orange);
      color: #fff;
      box-shadow: 0 4px 16px rgba(255, 107, 26, 0.4), 0 3px 0 #c44d00;
    }

    .btn-primary:hover {
      background: var(--orange2);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 107, 26, 0.5), 0 3px 0 #c44d00;
    }

    .btn-primary:active {
      transform: translateY(1px);
      box-shadow: 0 1px 0 #c44d00;
    }

    .btn-ghost {
      background: var(--bg2);
      border: 2px solid var(--border);
      color: var(--text-sub);
      box-shadow: 0 2px 0 var(--border);
    }
.btn-outline-blue {
  background: #fff;
  border: 3px solid #2f8cff;
  color: #2f5fae;
  border-radius: 999px;
  padding: 8px 28px;
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 0.92rem;
  font-weight: 800;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.18s ease;
  box-shadow: 0 2px 0 rgba(47, 140, 255, 0.15);
}

.btn-outline-blue:hover {
  background: #f4f9ff;
  transform: translateY(-1px);
  box-shadow: 0 5px 14px rgba(47, 140, 255, 0.18);
}

.btn-outline-blue:active {
  transform: translateY(1px);
}
    .btn-ghost:hover {
      border-color: var(--orange2);
      color: var(--orange);
      transform: translateY(-1px);
    }

    .match-count {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-sub);
      margin-left: auto;
      background: var(--bg2);
      padding: 8px 16px;
      border-radius: 999px;
      border: 2px solid var(--border);
    }

    .match-count span {
      color: var(--orange);
      font-size: 1.1rem;
      font-weight: 900;
    }

    /* クイズエリア */
    .quiz-area {
      display: none;
    }

    .quiz-area.active {
      display: block;
      animation: popIn 0.3s ease;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.97) translateY(8px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .quiz-progress {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-sub);
      background: var(--surface);
      padding: 7px 16px;
      border-radius: 999px;
      border: 2px solid var(--border);
    }

    .quiz-progress strong {
      color: var(--orange);
      font-size: 1.2rem;
    }

    .progress-bar {
      height: 10px;
      background: var(--border);
      border-radius: 999px;
      margin-bottom: 20px;
      overflow: hidden;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.06);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--orange), var(--yellow));
      border-radius: 999px;
      transition: width 0.5s cubic-bezier(.4, 0, .2, 1);
      box-shadow: 0 0 8px rgba(255, 107, 26, 0.5);
    }

    .card {
      background: var(--surface);
      border: 2.5px solid var(--border);
      border-radius: 20px;
      padding: 28px 32px;
      margin-bottom: 14px;
      box-shadow: 0 6px 24px var(--shadow);
      animation: popIn 0.25s ease;
    }

    .card-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .tag {
      font-size: 0.65rem;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 999px;
      letter-spacing: 0.08em;
    }

    .tag-subject-jp {
      background: #ffe0e0;
      color: var(--japan);
    }

    .tag-subject-wh {
      background: #ddeeff;
      color: var(--world);
    }

    .tag-era {
      background: var(--bg2);
      color: var(--text-sub);
      border: 1.5px solid var(--border);
    }

    .tag-region {
      background: var(--bg2);
      color: var(--text-sub);
      border: 1.5px solid var(--border);
    }

    .tag-theme {
      background: #fff3d0;
      color: #c07800;
      border: 1.5px solid #ffd98a;
    }

    .question-text {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 1.35rem;
      line-height: 1.8;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .answer-area {
      background: var(--bg2);
      border: 2.5px dashed var(--border);
      border-radius: 20px;
      padding: 22px 32px;
      margin-bottom: 14px;
      min-height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      flex-direction: column;
      gap: 4px;
      animation: popIn 0.25s ease;
    }

    .answer-area:hover {
      border-color: var(--orange2);
      background: #fff5ee;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--shadow);
    }

    .answer-area.revealed {
      background: #fff8f0;
      border: 2.5px solid var(--orange);
      cursor: default;
      transform: none !important;
      box-shadow: none !important;
    }

    .answer-hint-label {
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      color: var(--text-sub);
      margin-bottom: 4px;
    }

    .answer-text {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--orange);
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      transform: scale(0.9);
      text-shadow: 2px 2px 0 rgba(255, 107, 26, 0.15);
    }

    .answer-text.revealed {
      opacity: 1;
      transform: scale(1);
    }

    .reveal-hint {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-sub);
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .reveal-hint::before {
      content: '';
      font-size: 1rem;
    }

    .judge-buttons {
      display: flex;
      gap: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      transform: translateY(8px);
    }

    .judge-buttons.active {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }

    .btn-correct {
      flex: 1;
      padding: 14px;
      background: #e8faf0;
      border: 2.5px solid var(--green);
      color: var(--green);
      font-family: 'M PLUS Rounded 1c', sans-serif;
      font-size: 0.9rem;
      font-weight: 800;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 3px 0 #17854a;
      letter-spacing: 0.06em;
    }

    .btn-correct:hover {
      background: var(--green);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 5px 0 #17854a;
    }

    .btn-correct:active {
      transform: translateY(1px);
      box-shadow: 0 1px 0 #17854a;
    }

    .btn-wrong {
      flex: 1;
      padding: 14px;
      background: #fdeaea;
      border: 2.5px solid var(--red);
      color: var(--red);
      font-family: 'M PLUS Rounded 1c', sans-serif;
      font-size: 0.9rem;
      font-weight: 800;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 3px 0 #a01a1a;
      letter-spacing: 0.06em;
    }

    .btn-wrong:hover {
      background: var(--red);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 5px 0 #a01a1a;
    }

    .btn-wrong:active {
      transform: translateY(1px);
      box-shadow: 0 1px 0 #a01a1a;
    }

    .result-screen {
      display: none;
      text-align: center;
      padding: 50px 40px;
      background: var(--surface);
      border: 2.5px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 6px 32px var(--shadow);
    }

    .result-screen.active {
      display: block;
      animation: popIn 0.35s ease;
    }

    .result-emoji {
      font-size: 3.5rem;
      margin-bottom: 8px;
    }

    .result-score {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 5rem;
      font-weight: 900;
      color: var(--orange);
      line-height: 1;
      text-shadow: 3px 3px 0 rgba(255, 107, 26, 0.2);
      margin-bottom: 4px;
    }

    .result-label {
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      color: var(--text-sub);
      margin-bottom: 28px;
    }

    .result-detail {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 36px;
      background: var(--bg2);
      border-radius: 16px;
      padding: 20px;
      border: 2px solid var(--border);
    }

    .result-item {
      text-align: center;
    }

    .result-item .num {
      font-size: 2.2rem;
      font-weight: 900;
      display: block;
      font-family: 'Zen Maru Gothic', sans-serif;
    }

    .result-item .lbl {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--text-sub);
    }

    .num-correct {
      color: var(--green);
    }

    .num-wrong {
      color: var(--red);
    }

    .num-total {
      color: var(--orange);
    }

    .empty-state {
      display: none;
      text-align: center;
      padding: 48px;
      color: var(--text-sub);
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      background: var(--surface);
      border: 2.5px dashed var(--border);
      border-radius: 20px;
    }

    .empty-state.active {
      display: block;
    }

    .empty-state-emoji {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 12px;
    }

    @media (max-width: 600px) {
      .question-text { font-size: 1.1rem; }
      .answer-text { font-size: 1.3rem; }
      header h1 { font-size: 1.15rem; }
      .card { padding: 20px; }
      .answer-area { padding: 18px 20px; }
      .filter-row-2col { flex-direction: column; }
    }

    /* 問題一覧画面 */
    .list-screen {
      display: none;
    }

    .list-screen.active {
      display: block;
      animation: popIn 0.3s ease;
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .list-title {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--orange);
    }

    .list-count {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-sub);
      margin-bottom: 16px;
      background: var(--bg2);
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      border: 2px solid var(--border);
    }

    .list-item {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 14px 20px;
      margin-bottom: 8px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
      transition: border-color 0.15s;
      position: relative;
    }

    .list-item:hover {
      border-color: var(--orange2);
    }

    .list-num {
      font-size: 0.7rem;
      font-weight: 800;
      color: var(--text-sub);
      min-width: 28px;
      padding-top: 3px;
      letter-spacing: 0.05em;
    }

    .list-body {
      flex: 1;
    }

    .list-tags {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .list-q {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.6;
      margin-bottom: 6px;
    }

    .list-a-wrap {
      position: relative;
      display: inline-block;
    }

    .list-a {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 0.9rem;
      font-weight: 900;
      color: var(--orange);
      background: var(--orange);
      border-radius: 4px;
      padding: 2px 8px;
      cursor: default;
      user-select: none;
      transition: background 0.2s, color 0.2s;
      letter-spacing: 0.04em;
    }

    .list-a::before {
      content: '答え: ';
      font-size: 0.65rem;
      font-weight: 800;
      color: inherit;
      letter-spacing: 0.1em;
      opacity: 0.7;
    }

    .list-item:hover .list-a {
      background: #fff3e0;
      color: var(--orange);
    }

    /* ── 横並び2列 ── */
    .filter-row-2col {
      display: flex;
      gap: 10px;
      align-items: stretch;
      margin-bottom: 14px;
    }
    .filter-row-2col .filter-group {
      flex: 1;
      min-width: 0;
      margin-bottom: 0;
    }

    /* ── 折りたたみ ── */
    .collapsible {
      overflow: hidden;
      transition: max-height 0.35s ease, opacity 0.3s ease;
      max-height: 600px;
      opacity: 1;
      padding-top: 6px;
    }
    .collapsible.collapsed {
      max-height: 0;
      opacity: 0;
      padding-top: 0;
    }
    .collapse-header {
      display: flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, #fff5ee, #fff8f2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
      user-select: none;
      transition: all 0.15s;
    }
    .collapse-header:hover {
      background: linear-gradient(135deg, #ffe8d6, #fff0e6);
      border-color: var(--orange2);
    }
    .collapse-header:active { transform: scale(0.98); }
    .collapse-title {
      font-size: 0.72rem;
      font-weight: 800;
      color: var(--orange);
      letter-spacing: 0.12em;
      flex: 1;
    }
    .collapse-hint {
      font-size: 0.62rem;
      color: var(--orange);
      background: rgba(255, 107, 26, 0.10);
      border-radius: 20px;
      padding: 2px 8px;
      white-space: nowrap;
      font-weight: 800;
    }
    .collapse-arrow {
      font-size: 10px;
      color: var(--orange2);
      transition: transform 0.25s;
      display: inline-block;
    }
    .collapse-arrow.open { transform: rotate(90deg); }
    .collapsible-btns {
      display: flex;
      gap: 6px;
      padding: 4px 2px 6px;
    }
  </style>
</head>

<body>

  <header>
    <h1> 歴史一問一答 </h1>
  </header>

  <div class="container">

    <div class="filter-panel" id="filterPanel">
      <div class="panel-title">出題条件を絞り込む　</div>

      <div class="filter-group">
        <div class="filter-label">
          科目
          <button class="select-all-btn" data-group="subject">すべて選択</button>
        </div>
        <div class="filter-chips">
          <button class="chip subject-jp active" data-group="subject" data-val="日本史">日本史</button>
          <button class="chip subject-wh active" data-group="subject" data-val="世界史">世界史</button>
        </div>
      </div>
      
      
      
     <div class="filter-group">
  <div class="filter-label">
    難易度
    <button class="select-all-btn" data-group="difficulty">
      すべて選択
    </button>
  </div>

  <div class="filter-chips">
    <button class="chip active"
      data-group="difficulty"
      data-val="基本">

      const whBtn = document.querySelector('.select-all-btn[data-group="eraWH"]');
      if (whBtn) {
        const allSel = ERA_WH.every(v => filtersEraWH.includes(v));
        whBtn.textContent = allSel ? 'すべて解除' : 'すべて選択';
        whBtn.classList.toggle('all-selected', allSel);
      }
    }
    // すべて選択ボタン（era用）
    document.addEventListener('click', e => {
      const btn = e.target.closest('.select-all-btn');
      if (!btn) return;
      const group = btn.dataset.group;
      if (group === 'eraJP') {
        const allSel = ERA_JP.every(v => filtersEraJP.includes(v));
        if (allSel) {
          filtersEraJP.length = 0;
          document.querySelectorAll('#eraChipsJP .chip').forEach(c => c.classList.remove('active'));
        } else {
          filtersEraJP.length = 0;
          ERA_JP.forEach(v => filtersEraJP.push(v));
          document.querySelectorAll('#eraChipsJP .chip').forEach(c => c.classList.add('active'));
        }
        updateMatchCount();
        updateSelectAllBtnsEra();
      } else if (group === 'eraWH') {
        const allSel = ERA_WH.every(v => filtersEraWH.includes(v));
        if (allSel) {
          filtersEraWH.length = 0;
          document.querySelectorAll('#eraChipsWH .chip').forEach(c => c.classList.remove('active'));
        } else {
          filtersEraWH.length = 0;
          ERA_WH.forEach(v => filtersEraWH.push(v));
          document.querySelectorAll('#eraChipsWH .chip').forEach(c => c.classList.add('active'));
        }
        updateMatchCount();
        updateSelectAllBtnsEra();
      }
    });

    function updateFilterMode() {
      const hasJP = filters.subject.includes('日本史');
      const hasWH = filters.subject.includes('世界史');
      const jpOnly = hasJP && !hasWH;
      const regionGroup = document.getElementById('regionGroup');
      // 地域フィルター：日本史のみなら非表示、それ以外は表示
      regionGroup.style.display = jpOnly ? 'none' : '';
      if (jpOnly) filters.region = [];
      // 日本史時代パネル
      const eraGroupJP = document.getElementById('eraGroupJP');
      if (hasJP) {
        eraGroupJP.style.display = '';
        buildEraChipsFor(ERA_JP, 'eraChipsJP', filtersEraJP, 'eraJP');
      } else {
        eraGroupJP.style.display = 'none';
        filtersEraJP.length = 0;
      }
      // 世界史時代パネル
      const eraGroupWH = document.getElementById('eraGroupWH');
      if (hasWH) {
        eraGroupWH.style.display = '';
        buildEraChipsFor(ERA_WH, 'eraChipsWH', filtersEraWH, 'eraWH');
      } else {
        eraGroupWH.style.display = 'none';
        filtersEraWH.length = 0;
      }
      updateMatchCount();
      updateSelectAllBtnsEra();
    }
    // ========== 初期状態：科目を両方選択 ==========
    filters.subject = ['日本史', '世界史'];　
    filters.difficulty = ['基本', '難関'];
    updateFilterMode();

    // ========== チップ ==========
    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const {
          group,
          val
        } = chip.dataset;
        const idx = filters[group].indexOf(val);
        if (idx === -1) {
          filters[group].push(val);
          chip.classList.add('active');
        } else {
          filters[group].splice(idx, 1);
          chip.classList.remove('active');
        }
        if (group === 'subject') updateFilterMode();
        updateMatchCount();
        updateSelectAllBtns();
      });
    });
    // ========== すべて選択 ==========
    document.querySelectorAll('.select-all-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const group = btn.dataset.group;
        const chips = [...document.querySelectorAll(`.chip[data-group="${group}"]`)];
        const vals = chips.map(c => c.dataset.val);
        const allSelected = vals.every(v => filters[group].includes(v));
        if (allSelected) {
          filters[group] = [];
          chips.forEach(c => c.classList.remove('active'));
        } else {
          filters[group] = [...vals];
          chips.forEach(c => c.classList.add('active'));
        }
        if (group === 'subject') updateFilterMode();
        updateMatchCount();
        updateSelectAllBtns();
      });
    });

    function updateSelectAllBtns() {
      document.querySelectorAll('.select-all-btn').forEach(btn => {
        const group = btn.dataset.group;
        const chips = [...document.querySelectorAll(`.chip[data-group="${group}"]`)];
        const allSelected = chips.every(c => filters[group].includes(c.dataset.val));
        btn.textContent = allSelected ? 'すべて解除' : 'すべて選択';
        btn.classList.toggle('all-selected', allSelected);
      });
    }
    
    // ========== フィルタリング ==========
    function getFiltered() {
      const hasJP = filters.subject.includes('日本史');
      const hasWH = filters.subject.includes('世界史');
      const jpOnly = hasJP && !hasWH;
      return ALL_QUESTIONS.filter(q => {
        // 科目フィルター
        if (filters.subject.length && !filters.subject.includes(q.subject)) return false;
        // 時代フィルター（科目ごとに独立）
        if (q.subject === '日本史' && filtersEraJP.length && !filtersEraJP.includes(q.era)) return false;
        if (q.subject === '世界史' && filtersEraWH.length && !filtersEraWH.includes(q.era)) return false;
        // 地域フィルター（世界史のみ適用、日本史はスキップ）
        if (q.subject !== '日本史' && filters.region.length && !filters.region.includes(q.region)) return false;
        // テーマフィルター
        if (filters.theme.length && !filters.theme.some(t => (Array.isArray(q.theme) ? q.theme : [q.theme]).includes(t))) return false;
        
// 難易度フィルター
if (
  filters.difficulty.length &&
  !filters.difficulty.includes(q.difficulty || "基本")
) return false;        
        return true;
      });
    }

    function updateMatchCount() {
      document.getElementById('matchCount').textContent = getFiltered().length;
    }
    updateMatchCount();
    // ========== 出題開始 ==========
    document.getElementById('startBtn').addEventListener('click', () => {
      const filtered = getFiltered();
      document.getElementById('emptyState').classList.remove('active');
      if (filtered.length === 0) {
        document.getElementById('emptyState').classList.add('active');
        return;
      }
      startQuiz(shuffle(filtered));
    });

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function startQuiz(questions) {
      currentQuestions = questions;
      currentIndex = 0;
      correctCount = 0;
      wrongQuestions = [];
      document.getElementById('filterPanel').style.display = 'none';
      document.getElementById('resultScreen').classList.remove('active');
      document.getElementById('quizArea').classList.add('active');
      document.getElementById('totalNum').textContent = questions.length;
      showQuestion();
    }

    function showQuestion() {
      answered = false;
      const q = currentQuestions[currentIndex];
      document.getElementById('currentNum').textContent = currentIndex + 1;
      document.getElementById('progressFill').style.width = (currentIndex / currentQuestions.length * 100) + '%';
      const themes = (Array.isArray(q.theme) ? q.theme : [q.theme]);
      document.getElementById('cardTags').innerHTML =
        `<span class="tag tag-subject-${q.subject === '日本史' ? 'jp' : 'wh'}">${q.subject}</span>` +
        `<span class="tag tag-era">${q.era}</span>` +
        `<span class="tag tag-region">${q.region}</span>` +
        themes.map(t => `<span class="tag tag-theme">${t}</span>`).join('');
      document.getElementById('questionText').textContent = q.q;
      const answerEl = document.getElementById('answerText');
      const area = document.getElementById('answerArea');
      // トランジションを無効化して即座にopacity:0＆テキスト差し替え
      answerEl.style.transition = 'none';
      answerEl.style.opacity = '0';
      answerEl.style.transform = 'scale(0.9)';
      answerEl.classList.remove('revealed');
      area.classList.remove('revealed');
      answerEl.textContent = q.a;
      // 次フレームでトランジションを戻す
      requestAnimationFrame(() => {
        answerEl.style.transition = '';
        answerEl.style.opacity = '';
        answerEl.style.transform = '';
      });
      document.getElementById('revealHint').style.display = 'flex';
      document.getElementById('judgeButtons').classList.remove('active');
      area.onclick = revealAnswer;
    }

    function revealAnswer() {
      if (answered) return;
      answered = true;
      document.getElementById('answerText').classList.add('revealed');
      document.getElementById('revealHint').style.display = 'none';
      document.getElementById('judgeButtons').classList.add('active');
      const area = document.getElementById('answerArea');
      area.classList.add('revealed');
      area.onclick = null;
    }

    function judge(isCorrect) {
      if (isCorrect) correctCount++;
      else wrongQuestions.push(currentQuestions[currentIndex]);
      currentIndex++;
      if (currentIndex >= currentQuestions.length) showResult();
      else showQuestion();
    }

    function showResult() {
      document.getElementById('quizArea').classList.remove('active');
      const total = currentQuestions.length;
      const pct = Math.round(correctCount / total * 100);
      const emoji = pct >= 90 ? '' : pct >= 70 ? '' : pct >= 50 ? '' : '';
      document.getElementById('resultEmoji').textContent = emoji;
      document.getElementById('resultScore').textContent = pct + '%';
      document.getElementById('resultCorrect').textContent = correctCount;
      document.getElementById('resultWrong').textContent = total - correctCount;
      document.getElementById('resultTotal').textContent = total;
      document.getElementById('resultScreen').classList.add('active');
    }

    function backToFilter() {
      document.getElementById('resultScreen').classList.remove('active');
      document.getElementById('filterPanel').style.display = 'block';
      updateMatchCount();
    }

    function retryWrong() {
      if (!wrongQuestions.length) {
        backToFilter();
        return;
      }
      document.getElementById('resultScreen').classList.remove('active');
      startQuiz(shuffle(wrongQuestions));
    }
    document.getElementById('backToFilterBtn').addEventListener('click', () => {
      document.getElementById('quizArea').classList.remove('active');
      document.getElementById('filterPanel').style.display = 'block';
      updateMatchCount();
    });
    // ========== 問題一覧 ==========
    document.getElementById('listBtn').addEventListener('click', () => {
      const filtered = getFiltered();
      document.getElementById('filterPanel').style.display = 'none';
      document.getElementById('emptyState').classList.remove('active');
      if (filtered.length === 0) {
        document.getElementById('filterPanel').style.display = 'block';
        document.getElementById('emptyState').classList.add('active');
        return;
      }
      document.getElementById('listCount').textContent = filtered.length;
      const container = document.getElementById('listContainer');
      container.innerHTML = '';
      filtered.forEach((q, i) => {
        const themes = Array.isArray(q.theme) ? q.theme : [q.theme];
        const subjectClass = q.subject === '日本史' ? 'jp' : 'wh';
        const tagsHtml =
          `<span class="tag tag-subject-${subjectClass}">${q.subject}</span>` +
          `<span class="tag tag-era">${q.era}</span>` +
          `<span class="tag tag-region">${q.region}</span>` +
          themes.map(t => `<span class="tag tag-theme">${t}</span>`).join('');
        const item = document.createElement('div');
        item.className = 'list-item';
        item.innerHTML = `
      <div class="list-num">${i + 1}</div>
      <div class="list-body">
        <div class="list-tags">${tagsHtml}</div>
        <div class="list-q">${q.q}</div>
        <div class="list-a-wrap"><span class="list-a">${q.a}</span></div>
      </div>
    `;
        container.appendChild(item);
      });
      document.getElementById('listScreen').classList.add('active');
    });
    document.getElementById('backFromListBtn').addEventListener('click', () => {
      document.getElementById('listScreen').classList.remove('active');
      document.getElementById('filterPanel').style.display = 'block';
      updateMatchCount();
    });
  </script>
</body>

</html>
