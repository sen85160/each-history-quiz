<!DOCTYPE html>
<html lang="en">

  <!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>歴史一問一答</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #ff6b1a;
      --orange2: #ff9448;
      --orange3: #ffb87a;
      --yellow: #ffd94a;
      --bg: #fff8f0;
      --bg2: #fff2e3;
      --surface: #ffffff;
      --border: #ffd4b0;
      --text: #2d1a00;
      --text-sub: #a0663a;
      --red: #e03030;
      --green: #22a855;
      --japan: #e03030;
      --world: #2271e0;
      --shadow: rgba(255, 107, 26, 0.18);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'M PLUS Rounded 1c', sans-serif;
      min-height: 100vh;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(255, 107, 26, 0.10) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(255, 217, 74, 0.13) 0%, transparent 40%),
        radial-gradient(circle at 60% 10%, rgba(255, 148, 72, 0.08) 0%, transparent 30%);
    }

    header {
      background: var(--orange);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 4px 20px var(--shadow);
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      right: -30px;
      top: -30px;
      width: 120px;
      height: 120px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 50%;
    }

    header::after {
      content: '';
      position: absolute;
      right: 60px;
      bottom: -40px;
      width: 90px;
      height: 90px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 50%;
    }

    header h1 {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 1.5rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.06em;
      text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.15);
    }

    .header-badge {
      background: var(--yellow);
      color: var(--orange);
      font-size: 0.65rem;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 999px;
      letter-spacing: 0.1em;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 20px;
    }

    .filter-panel {
      background: var(--surface);
      border: 2.5px solid var(--border);
      border-radius: 20px;
      padding: 24px 24px 20px;
      margin-bottom: 24px;
      box-shadow: 0 6px 32px var(--shadow);
    }

    .panel-title {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.18em;
      color: var(--orange);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-title::before {
      content: '';
      display: inline-block;
      width: 10px;
      height: 10px;
      background: var(--orange);
      border-radius: 50%;
    }

    .filter-group {
      margin-bottom: 14px;
    }

    .filter-group:last-of-type {
      margin-bottom: 0;
    }

    .filter-label {
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      color: var(--text-sub);
      margin-bottom: 7px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .chip {
      padding: 5px 13px;
      border-radius: 999px;
      border: 2px solid var(--border);
      background: var(--bg2);
      color: var(--text-sub);
      font-size: 0.76rem;
      font-weight: 700;
      font-family: 'M PLUS Rounded 1c', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.03em;
      user-select: none;
    }

    .chip:hover {
      border-color: var(--orange2);
      color: var(--orange);
      background: #fff5ee;
      transform: translateY(-1px);
    }

    .chip.active {
      background: var(--orange);
      border-color: var(--orange);
      color: #fff;
      box-shadow: 0 3px 10px rgba(255, 107, 26, 0.35);
      transform: translateY(-1px);
    }

    .chip.subject-jp.active {
      background: var(--japan);
      border-color: var(--japan);
    }

    .chip.subject-wh.active {
      background: var(--world);
      border-color: var(--world);
    }

    .select-all-btn {
      padding: 4px 10px;
      border-radius: 999px;
      border: 2px dashed var(--border);
      background: transparent;
      color: var(--text-sub);
      font-size: 0.68rem;
      font-weight: 800;
      font-family: 'M PLUS Rounded 1c', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .select-all-btn:hover {
      border-color: var(--orange);
      color: var(--orange);
      background: #fff5ee;
    }

    .select-all-btn.all-selected {
      border-color: var(--orange2);
      color: var(--orange2);
    }

    .filter-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
      padding-top: 18px;
      border-top: 2px dashed var(--border);
      flex-wrap: wrap;
    }

    .btn {
      padding: 11px 26px;
      border-radius: 999px;
      border: none;
      font-family: 'M PLUS Rounded 1c', sans-serif;
      font-size: 0.85rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.06em;
    }

    .btn-primary {
      background: var(--orange);
      color: #fff;
      box-shadow: 0 4px 16px rgba(255, 107, 26, 0.4), 0 3px 0 #c44d00;
    }

    .btn-primary:hover {
      background: var(--orange2);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 107, 26, 0.5), 0 3px 0 #c44d00;
    }

    .btn-primary:active {
      transform: translateY(1px);
      box-shadow: 0 1px 0 #c44d00;
    }

    .btn-ghost {
      background: var(--bg2);
      border: 2px solid var(--border);
      color: var(--text-sub);
      box-shadow: 0 2px 0 var(--border);
    }

    .btn-ghost:hover {
      border-color: var(--orange2);
      color: var(--orange);
      transform: translateY(-1px);
    }

    .match-count {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-sub);
      margin-left: auto;
      background: var(--bg2);
      padding: 8px 16px;
      border-radius: 999px;
      border: 2px solid var(--border);
    }

    .match-count span {
      color: var(--orange);
      font-size: 1.1rem;
      font-weight: 900;
    }

    /* クイズエリア */
    .quiz-area {
      display: none;
    }

    .quiz-area.active {
      display: block;
      animation: popIn 0.3s ease;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.97) translateY(8px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .quiz-progress {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-sub);
      background: var(--surface);
      padding: 7px 16px;
      border-radius: 999px;
      border: 2px solid var(--border);
    }

    .quiz-progress strong {
      color: var(--orange);
      font-size: 1.2rem;
    }

    .progress-bar {
      height: 10px;
      background: var(--border);
      border-radius: 999px;
      margin-bottom: 20px;
      overflow: hidden;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.06);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--orange), var(--yellow));
      border-radius: 999px;
      transition: width 0.5s cubic-bezier(.4, 0, .2, 1);
      box-shadow: 0 0 8px rgba(255, 107, 26, 0.5);
    }

    .card {
      background: var(--surface);
      border: 2.5px solid var(--border);
      border-radius: 20px;
      padding: 28px 32px;
      margin-bottom: 14px;
      box-shadow: 0 6px 24px var(--shadow);
      animation: popIn 0.25s ease;
    }

    .card-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .tag {
      font-size: 0.65rem;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 999px;
      letter-spacing: 0.08em;
    }

    .tag-subject-jp {
      background: #ffe0e0;
      color: var(--japan);
    }

    .tag-subject-wh {
      background: #ddeeff;
      color: var(--world);
    }

    .tag-era {
      background: var(--bg2);
      color: var(--text-sub);
      border: 1.5px solid var(--border);
    }

    .tag-region {
      background: var(--bg2);
      color: var(--text-sub);
      border: 1.5px solid var(--border);
    }

    .tag-theme {
      background: #fff3d0;
      color: #c07800;
      border: 1.5px solid #ffd98a;
    }

    .question-text {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 1.35rem;
      line-height: 1.8;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .answer-area {
      background: var(--bg2);
      border: 2.5px dashed var(--border);
      border-radius: 20px;
      padding: 22px 32px;
      margin-bottom: 14px;
      min-height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      flex-direction: column;
      gap: 4px;
      animation: popIn 0.25s ease;
    }

    .answer-area:hover {
      border-color: var(--orange2);
      background: #fff5ee;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--shadow);
    }

    .answer-area.revealed {
      background: #fff8f0;
      border: 2.5px solid var(--orange);
      cursor: default;
      transform: none !important;
      box-shadow: none !important;
    }

    .answer-hint-label {
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      color: var(--text-sub);
      margin-bottom: 4px;
    }

    .answer-text {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--orange);
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      transform: scale(0.9);
      text-shadow: 2px 2px 0 rgba(255, 107, 26, 0.15);
    }

    .answer-text.revealed {
      opacity: 1;
      transform: scale(1);
    }

    .reveal-hint {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-sub);
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .reveal-hint::before {
      content: '';
      font-size: 1rem;
    }

    .judge-buttons {
      display: flex;
      gap: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      transform: translateY(8px);
    }

    .judge-buttons.active {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }

    .btn-correct {
      flex: 1;
      padding: 14px;
      background: #e8faf0;
      border: 2.5px solid var(--green);
      color: var(--green);
      font-family: 'M PLUS Rounded 1c', sans-serif;
      font-size: 0.9rem;
      font-weight: 800;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 3px 0 #17854a;
      letter-spacing: 0.06em;
    }

    .btn-correct:hover {
      background: var(--green);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 5px 0 #17854a;
    }

    .btn-correct:active {
      transform: translateY(1px);
      box-shadow: 0 1px 0 #17854a;
    }

    .btn-wrong {
      flex: 1;
      padding: 14px;
      background: #fdeaea;
      border: 2.5px solid var(--red);
      color: var(--red);
      font-family: 'M PLUS Rounded 1c', sans-serif;
      font-size: 0.9rem;
      font-weight: 800;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 3px 0 #a01a1a;
      letter-spacing: 0.06em;
    }

    .btn-wrong:hover {
      background: var(--red);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 5px 0 #a01a1a;
    }

    .btn-wrong:active {
      transform: translateY(1px);
      box-shadow: 0 1px 0 #a01a1a;
    }

    .result-screen {
      display: none;
      text-align: center;
      padding: 50px 40px;
      background: var(--surface);
      border: 2.5px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 6px 32px var(--shadow);
    }

    .result-screen.active {
      display: block;
      animation: popIn 0.35s ease;
    }

    .result-emoji {
      font-size: 3.5rem;
      margin-bottom: 8px;
    }

    .result-score {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 5rem;
      font-weight: 900;
      color: var(--orange);
      line-height: 1;
      text-shadow: 3px 3px 0 rgba(255, 107, 26, 0.2);
      margin-bottom: 4px;
    }

    .result-label {
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      color: var(--text-sub);
      margin-bottom: 28px;
    }

    .result-detail {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 36px;
      background: var(--bg2);
      border-radius: 16px;
      padding: 20px;
      border: 2px solid var(--border);
    }

    .result-item {
      text-align: center;
    }

    .result-item .num {
      font-size: 2.2rem;
      font-weight: 900;
      display: block;
      font-family: 'Zen Maru Gothic', sans-serif;
    }

    .result-item .lbl {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--text-sub);
    }

    .num-correct {
      color: var(--green);
    }

    .num-wrong {
      color: var(--red);
    }

    .num-total {
      color: var(--orange);
    }

    .empty-state {
      display: none;
      text-align: center;
      padding: 48px;
      color: var(--text-sub);
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      background: var(--surface);
      border: 2.5px dashed var(--border);
      border-radius: 20px;
    }

    .empty-state.active {
      display: block;
    }

    .empty-state-emoji {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 12px;
    }

    @media (max-width: 600px) {
      .question-text {
        font-size: 1.1rem;
      }

      .answer-text {
        font-size: 1.3rem;
      }

      header h1 {
        font-size: 1.15rem;
      }

      .card {
        padding: 20px;
      }

      .answer-area {
        padding: 18px 20px;
      }
    }

    /* 問題一覧画面 */
    .list-screen {
      display: none;
    }

    .list-screen.active {
      display: block;
      animation: popIn 0.3s ease;
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .list-title {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--orange);
    }

    .list-count {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-sub);
      margin-bottom: 16px;
      background: var(--bg2);
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      border: 2px solid var(--border);
    }

    .list-item {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 14px 20px;
      margin-bottom: 8px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
      transition: border-color 0.15s;
      position: relative;
    }

    .list-item:hover {
      border-color: var(--orange2);
    }

    .list-num {
      font-size: 0.7rem;
      font-weight: 800;
      color: var(--text-sub);
      min-width: 28px;
      padding-top: 3px;
      letter-spacing: 0.05em;
    }

    .list-body {
      flex: 1;
    }

    .list-tags {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .list-q {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.6;
      margin-bottom: 6px;
    }

    .list-a-wrap {
      position: relative;
      display: inline-block;
    }

    .list-a {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 0.9rem;
      font-weight: 900;
      color: var(--orange);
      background: var(--orange);
      border-radius: 4px;
      padding: 2px 8px;
      cursor: default;
      user-select: none;
      transition: background 0.2s, color 0.2s;
      letter-spacing: 0.04em;
    }

    .list-a::before {
      content: '答え: ';
      font-size: 0.65rem;
      font-weight: 800;
      color: inherit;
      letter-spacing: 0.1em;
      opacity: 0.7;
    }

    .list-item:hover .list-a {
      background: #fff3e0;
      color: var(--orange);
    }
  </style>
</head>

<body>

  <header>
    <h1> 歴史一問一答</h1>
    <span class="header-badge">HIGH SCHOOL</span>
  </header>

  <div class="container">

    <div class="filter-panel" id="filterPanel">
      <div class="panel-title">絞り込み条件</div>

      <div class="filter-group">
        <div class="filter-label">
          科目
          <button class="select-all-btn" data-group="subject">すべて選択</button>
        </div>
        <div class="filter-chips">
          <button class="chip subject-jp" data-group="subject" data-val="日本史"> 日本史</button>
          <button class="chip subject-wh" data-group="subject" data-val="世界史"> 世界史</button>
        </div>
      </div>

      <div class="filter-group" id="eraGroupJP" style="display:none">
        <div class="filter-label">
          時代（日本史）
          <button class="select-all-btn" data-group="eraJP">すべて選択</button>
        </div>
        <div class="filter-chips" id="eraChipsJP"></div>
      </div>
      <div class="filter-group" id="eraGroupWH" style="display:none">
        <div class="filter-label">
          時代（世界史）
          <button class="select-all-btn" data-group="eraWH">すべて選択</button>
        </div>
        <div class="filter-chips" id="eraChipsWH"></div>
      </div>

      <div class="filter-group" id="regionGroup">
        <div class="filter-label">
          地域
          <button class="select-all-btn" data-group="region">すべて選択</button>
        </div>
        <div class="filter-chips">
          <button class="chip" data-group="region" data-val="中華王朝">中華王朝</button>
          <button class="chip" data-group="region" data-val="朝鮮半島">朝鮮半島</button>
          <button class="chip" data-group="region" data-val="東南アジア">東南アジア</button>
          <button class="chip" data-group="region" data-val="南アジア">南アジア</button>
          <button class="chip" data-group="region" data-val="西アジア">西アジア</button>
          <button class="chip" data-group="region" data-val="中央ユーラシア">中央ユーラシア</button>
          <button class="chip" data-group="region" data-val="地中海沿岸">地中海沿岸</button>
          <button class="chip" data-group="region" data-val="イスラム圏">イスラム圏</button>
          <button class="chip" data-group="region" data-val="ヨーロッパ">ヨーロッパ</button>
          <button class="chip" data-group="region" data-val="フランス">フランス</button>
          <button class="chip" data-group="region" data-val="イギリス">イギリス</button>
          <button class="chip" data-group="region" data-val="ドイツ">ドイツ</button>
          <button class="chip" data-group="region" data-val="ロシア">ロシア</button>
          <button class="chip" data-group="region" data-val="アフリカ">アフリカ</button>
          <button class="chip" data-group="region" data-val="アメリカ">アメリカ</button>
          <button class="chip" data-group="region" data-val="ラテン・南アメリカ">ラテン・南アメリカ</button>
        </div>
      </div>

      <div class="filter-group">
        <div class="filter-label">
          テーマ
          <button class="select-all-btn" data-group="theme">すべて選択</button>
        </div>
        <div class="filter-chips">
          <button class="chip" data-group="theme" data-val="東洋文化">東洋文化</button>

      container.innerHTML = '';
      eras.forEach(val => {
        const btn = document.createElement('button');
        btn.className = 'chip' + (prevActive.has(val) ? ' active' : '');
        btn.dataset.group = groupKey;
        btn.dataset.val = val;
        btn.textContent = val;
        if (prevActive.has(val)) filtersArr.push(val);
        btn.addEventListener('click', () => {
          const idx = filtersArr.indexOf(val);
          if (idx === -1) {
            filtersArr.push(val);
            btn.classList.add('active');
          } else {
            filtersArr.splice(idx, 1);
            btn.classList.remove('active');
          }
          updateMatchCount();
          updateSelectAllBtnsEra();
        });
        container.appendChild(btn);
      });
    }

        `<span class="tag tag-era">${q.era}</span>` +
        `<span class="tag tag-region">${q.region}</span>` +
        themes.map(t => `<span class="tag tag-theme">${t}</span>`).join('');
      document.getElementById('questionText').textContent = q.q;
      const answerEl = document.getElementById('answerText');
      const area = document.getElementById('answerArea');
      // トランジションを無効化して即座にopacity:0＆テキスト差し替え
      answerEl.style.transition = 'none';
      answerEl.style.opacity = '0';
      answerEl.style.transform = 'scale(0.9)';
      answerEl.classList.remove('revealed');
      area.classList.remove('revealed');
      answerEl.textContent = q.a;
      // 次フレームでトランジションを戻す
      requestAnimationFrame(() => {
        answerEl.style.transition = '';
        answerEl.style.opacity = '';
        answerEl.style.transform = '';
      });
      document.getElementById('revealHint').style.display = 'flex';
      document.getElementById('judgeButtons').classList.remove('active');
      area.onclick = revealAnswer;
    }

    function revealAnswer() {
      if (answered) return;
      answered = true;
      document.getElementById('answerText').classList.add('revealed');
      document.getElementById('revealHint').style.display = 'none';
      document.getElementById('judgeButtons').classList.add('active');
      const area = document.getElementById('answerArea');
      area.classList.add('revealed');
      area.onclick = null;
    }

    function judge(isCorrect) {
      if (isCorrect) correctCount++;
      else wrongQuestions.push(currentQuestions[currentIndex]);
      currentIndex++;
      if (currentIndex >= currentQuestions.length) showResult();
      else showQuestion();
    }

    function showResult() {
      document.getElementById('quizArea').classList.remove('active');
      const total = currentQuestions.length;
      const pct = Math.round(correctCount / total * 100);
      const emoji = pct >= 90 ? '' : pct >= 70 ? '' : pct >= 50 ? '' : '';
      document.getElementById('resultEmoji').textContent = emoji;
      document.getElementById('resultScore').textContent = pct + '%';
      document.getElementById('resultCorrect').textContent = correctCount;
      document.getElementById('resultWrong').textContent = total - correctCount;
      document.getElementById('resultTotal').textContent = total;
      document.getElementById('resultScreen').classList.add('active');
    }

    function backToFilter() {
      document.getElementById('resultScreen').classList.remove('active');
      document.getElementById('filterPanel').style.display = 'block';
      updateMatchCount();
    }

    function retryWrong() {
      if (!wrongQuestions.length) {
        backToFilter();
        return;
      }
      document.getElementById('resultScreen').classList.remove('active');
      startQuiz(shuffle(wrongQuestions));
    }
    document.getElementById('backToFilterBtn').addEventListener('click', () => {
      document.getElementById('quizArea').classList.remove('active');
      document.getElementById('filterPanel').style.display = 'block';
      updateMatchCount();
    });
    // ========== 問題一覧 ==========
    document.getElementById('listBtn').addEventListener('click', () => {
      const filtered = getFiltered();
      document.getElementById('filterPanel').style.display = 'none';
      document.getElementById('emptyState').classList.remove('active');
      if (filtered.length === 0) {
        document.getElementById('filterPanel').style.display = 'block';
        document.getElementById('emptyState').classList.add('active');
        return;
      }
      document.getElementById('listCount').textContent = filtered.length;
      const container = document.getElementById('listContainer');
      container.innerHTML = '';
      filtered.forEach((q, i) => {
        const themes = Array.isArray(q.theme) ? q.theme : [q.theme];
        const subjectClass = q.subject === '日本史' ? 'jp' : 'wh';
        const tagsHtml =
          `<span class="tag tag-subject-${subjectClass}">${q.subject}</span>` +
          `<span class="tag tag-era">${q.era}</span>` +
          `<span class="tag tag-region">${q.region}</span>` +
          themes.map(t => `<span class="tag tag-theme">${t}</span>`).join('');
        const item = document.createElement('div');
        item.className = 'list-item';
        item.innerHTML = `
      <div class="list-num">${i + 1}</div>
      <div class="list-body">
        <div class="list-tags">${tagsHtml}</div>
        <div class="list-q">${q.q}</div>
        <div class="list-a-wrap"><span class="list-a">${q.a}</span></div>
      </div>
    `;
        container.appendChild(item);
      });
      document.getElementById('listScreen').classList.add('active');
    });
    document.getElementById('backFromListBtn').addEventListener('click', () => {
      document.getElementById('listScreen').classList.remove('active');
      document.getElementById('filterPanel').style.display = 'block';
      updateMatchCount();
    });
  </script>
</body>

</html>
